<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bütçem - Gelir Gider</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="user-greeting">
                <div class="avatar"><i class="fa-solid fa-wallet"></i></div>
                <div>
                    <h2 class="greeting">Hoş Geldiniz</h2>
                    <p class="date" id="currentDate">--</p>
                </div>
            </div>
        </header>

        <!-- Balance Card -->
        <section class="balance-section">
            <div class="balance-card glass">
                <p class="balance-label">Toplam Bakiye</p>
                <h1 class="balance-amount" id="totalBalance">₺0.00</h1>
            </div>
            
            <div class="stats-row">
                <div class="stat-card glass income">
                    <div class="stat-icon"><i class="fa-solid fa-arrow-down"></i></div>
                    <div class="stat-info">
                        <p>Gelir</p>
                        <h3 id="totalIncome">₺0.00</h3>
                    </div>
                </div>
                <div class="stat-card glass expense">
                    <div class="stat-icon"><i class="fa-solid fa-arrow-up"></i></div>
                    <div class="stat-info">
                        <p>Gider</p>
                        <h3 id="totalExpense">₺0.00</h3>
                    </div>
                </div>
            </div>
        </section>

        <!-- Actions -->
        <section class="actions">
            <button class="btn btn-income" onclick="openModal('income')">
                <i class="fa-solid fa-plus"></i> Gelir
            </button>
            <button class="btn btn-expense" onclick="openModal('expense')">
                <i class="fa-solid fa-minus"></i> Gider
            </button>
            <button class="btn btn-primary" onclick="openSidebar()">
                <i class="fa-solid fa-chart-pie"></i> Raporlar
            </button>
        </section>

        <!-- Recent Transactions -->
        <section class="transactions">
            <div class="section-header">
                <h3>Son İşlemler</h3>
                <button class="filter-btn" onclick="clearData()"><i class="fa-solid fa-trash-can"></i> Tümünü Sil</button>
            </div>
            <div class="transaction-list" id="transactionList">
                <!-- Transactions will be rendered here -->
            </div>
        </section>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="transactionModal">
        <div class="modal glass">
            <div class="modal-header">
                <h3 id="modalTitle">Yeni İşlem Ekle</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button type="submit" form="transactionForm" class="btn btn-primary" style="padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: bold;">Kaydet</button>
                    <button class="close-btn" type="button" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <form id="transactionForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="transType" value="">
                
                <div class="form-group">
                    <label>Tutar (₺)</label>
                    <input type="text" inputmode="decimal" id="transAmount" required placeholder="0,00" oninput="formatAmountInput(this)">
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">Kategori</label>
                        <button type="button" class="btn-link" onclick="toggleCategoryEditMode()" id="editCategoryBtn" style="background:none;border:none;color:var(--primary-color);font-size:13px;cursor:pointer;">Düzenle</button>
                    </div>
                    <div id="categoryGrid" class="category-grid">
                        <!-- Categories dynamically loaded -->
                    </div>
                    <!-- Hidden input to hold the selected category value for validation -->
                    <input type="text" id="transCategory" style="opacity:0; position:absolute; height:0; width:0; z-index:-1;">
                </div>

                <div class="form-group">
                    <label>Açıklama (Opsiyonel)</label>
                    <input type="text" id="transDesc" placeholder="Detay yazabilirsiniz...">
                </div>

                <div class="form-group">
                    <label>Tarih</label>
                    <input type="date" id="transDate" required>
                </div>

                <!-- Kaydet button moved to header -->
            </form>
        </div>
    </div>

    <!-- Reports Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Reports Sidebar -->
    <div class="sidebar glass" id="reportsSidebar">
        <div class="sidebar-header">
            <h3>Gider Analizi</h3>
            <button class="close-btn" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content">
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="category-summary">
                <h4>Kategorilere Göre Toplamlar</h4>
                <div id="categorySummaryList" class="category-list">
                    <!-- Summaries generated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Category Detail Modal -->
    <div class="modal-overlay" id="categoryDetailModal">
        <div class="modal glass" style="height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h3 id="detailModalTitle">Detaylar</h3>
                <button class="close-btn" onclick="closeDetailModal()"><i class="fa-solid fa-arrow-left"></i></button>
            </div>
            <div class="detail-total-box glass">
                <span>Toplam Harcama:</span>
                <h2 id="detailCategoryTotal">₺0.00</h2>
            </div>
            <div class="transaction-list filter-detail-list" id="detailTransactionList" style="flex: 1; overflow-y: auto; margin-top: 15px;">
                <!-- Filtered transactions here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
